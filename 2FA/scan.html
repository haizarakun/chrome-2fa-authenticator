<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRコード読み取り</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 12px; background: #202124; color: #e8eaed; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    select { width: 100%; padding: 6px; font-size: 12px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #5f6368; background: #303134; color: #e8eaed; }
    .video-wrap { position: relative; width: 100%; background: #000; border-radius: 6px; overflow: hidden; }
    video { width: 100%; display: block; }
    canvas { display: none; }
    .status { margin-top: 10px; font-size: 12px; min-height: 18px; }
    .status.ok { color: #81c995; }
    .status.err { color: #f28b82; }
    button { width: 100%; margin-top: 10px; padding: 8px; font-size: 12px; font-weight: bold; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1557b0; }
  </style>
</head>
<body>
  <h1>カメラでQRコードを読み取り（完全ローカル処理）</h1>
  <select id="cameraSelect"></select>
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
  </div>
  <canvas id="canvas"></canvas>
  <div class="status" id="status">カメラを起動しています...</div>
  <button id="closeBtn">閉じる</button>

  <script src="crypto-lib.js"></script>
  <script src="jsqr.min.js"></script>
  <script src="scan.js"></script>
</body>
</html>
